<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery | Addis Implant</title>
  <meta name="description" content="A polished image gallery of clinic, consultation, and patient-care visuals for Addis Implant." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./style.css" />
  <script src="./script.js" defer></script>
</head>
<body data-page="gallery">
  <header id="site-header"></header>
  <main>
    <section class="section-surface py-16 sm:py-20">
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <span class="section-chip">Gallery</span>
        <h1 class="mt-4 text-5xl font-bold leading-[0.95]">A visual gallery that supports the high-end feel of the practice</h1>
        <p class="mt-5 max-w-3xl text-base leading-8 text-slate-600">These images help establish a calm, premium impression while reinforcing the clinical focus of the site.</p>

        <div class="mt-10 grid gap-6 md:grid-cols-2 xl:grid-cols-3">
          <img src="https://images.pexels.com/photos/3845723/pexels-photo-3845723.jpeg?auto=compress&cs=tinysrgb&w=1600" alt="Modern dental clinic interior" class="reveal h-80 w-full rounded-[1.75rem] object-cover shadow-xl" />
          <img src="https://images.pexels.com/photos/7422520/pexels-photo-7422520.jpeg?auto=compress&cs=tinysrgb&w=1600" alt="Bright modern dental office" class="reveal h-80 w-full rounded-[1.75rem] object-cover shadow-xl" />
          <img src="https://images.pexels.com/photos/8313253/pexels-photo-8313253.jpeg?auto=compress&cs=tinysrgb&w=1600" alt="Doctor and patient in a consultation room" class="reveal h-80 w-full rounded-[1.75rem] object-cover shadow-xl" />
          <img src="doctor_aslam.jpg" alt="Dr. Aslam portrait" class="reveal h-80 w-full rounded-[1.75rem] object-cover object-top shadow-xl" />
          <img src="https://images.pexels.com/photos/6528855/pexels-photo-6528855.jpeg?auto=compress&cs=tinysrgb&w=1600" alt="Dental professional in a clinic" class="reveal h-80 w-full rounded-[1.75rem] object-cover shadow-xl" />
          <img src="https://images.pexels.com/photos/5622014/pexels-photo-5622014.jpeg?auto=compress&cs=tinysrgb&w=1600" alt="Smiling patient after treatment" class="reveal h-80 w-full rounded-[1.75rem] object-cover shadow-xl" />
        </div>
      </div>
    </section>
  </main>
  <footer id="site-footer"></footer>
</body>
</html>
